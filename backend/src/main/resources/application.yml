spring:
  application:
    name: pico-self-service-cloud

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:pico}
    username: ${DB_USER:pico}
    password: ${DB_PASSWORD:pico}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 2

  modulith:
    events:
      jdbc:
        schema-initialization:
          enabled: true

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 20

  flyway:
    enabled: true
    locations: classpath:db/migration

  threads:
    virtual:
      enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

server:
  port: ${SERVER_PORT:8080}

logging:
  level:
    root: INFO
    com.pico: DEBUG
